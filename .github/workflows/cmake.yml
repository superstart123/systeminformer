name: 'cmake-continuous-integration'

on:
  workflow_dispatch:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
        toolchain:
          - msvc-amd64
          - msvc-arm64
          - msvc-x86
          - clang-msvc-amd64
          - clang-msvc-arm64
          - clang-msvc-x86
        configuration:
          - Debug
          - Release
        generator:
          - Ninja
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.configuration }} ${{ matrix.toolchain }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

    - name: NuGet Cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: |
          packages
          ~\.nuget\packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.config', '**/*.csproj', '**/Directory.Packages.props', '**/packages.lock.json', '**/NuGet.Config', '**/global.json') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Nuget Restore
      shell: cmd
      working-directory: ${{github.workspace}}
      run: nuget restore .\packages.config -PackagesDirectory .\packages\

    - name: BuildTools Cache
      id: custombuildtool-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: tools/CustomBuildTool/bin/Release/**
        key: custombuildtool-${{ runner.os }}-${{ hashFiles('tools/CustomBuildTool/**', '!tools/CustomBuildTool/bin/**') }}
        restore-keys: custombuildtool-${{ runner.os }}-

    - name: Build Tools
      if: steps.custombuildtool-cache.outputs.cache-hit != 'true'
      shell: cmd
      working-directory: ${{github.workspace}}
      run: build\build_init.cmd

    - name: Generate
      shell: cmd
      working-directory: ${{github.workspace}}
      run: build\build_cmake.cmd "${{ matrix.generator }}" ${{ matrix.configuration }} ${{ matrix.toolchain }} generate

    - name: Build
      shell: cmd
      working-directory: ${{github.workspace}}
      run: build\build_cmake.cmd "${{ matrix.generator }}" ${{ matrix.configuration }} ${{ matrix.toolchain }} build

    - name: Upload Release Artifacts (x86 32-bit)
      if: matrix.configuration == 'Release' && matrix.toolchain == 'msvc-x86'
      uses: actions/upload-artifact@v4
      with:
        name: mythic-msvc-x86-Release
        path: bin-cmake/Release/mythic.exe
        retention-days: 90

    - name: Upload Release Artifacts (x64 64-bit)
      if: matrix.configuration == 'Release' && matrix.toolchain == 'msvc-amd64'
      uses: actions/upload-artifact@v4
      with:
        name: mythic-msvc-amd64-Release
        path: bin-cmake/Release/mythic.exe
        retention-days: 90

    - name: Upload Release Artifacts (ARM64)
      if: matrix.configuration == 'Release' && matrix.toolchain == 'msvc-arm64'
      uses: actions/upload-artifact@v4
      with:
        name: mythic-msvc-arm64-Release
        path: bin-cmake/Release/mythic.exe
        retention-days: 90

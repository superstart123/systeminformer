name: 'Conker Online - CI Build'

on:
  workflow_dispatch:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
        toolchain:
          - msvc-amd64      # 64-bit (الأساسي)
          - msvc-x86        # 32-bit (للتوافق)
        configuration:
          - Release         # نبني Release فقط عشان السرعة
        generator:
          - Ninja
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.configuration }} ${{ matrix.toolchain }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

    # ===== إعداد البيئة =====
    - name: Setup MSVC Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.toolchain == 'msvc-amd64' && 'x64' || 'x86' }}

    # ===== الكاشات =====
    - name: NuGet Cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: |
          packages
          ~\.nuget\packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.config', '**/*.csproj', '**/Directory.Packages.props', '**/packages.lock.json', '**/NuGet.Config', '**/global.json') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Nuget Restore
      shell: cmd
      working-directory: ${{github.workspace}}
      run: nuget restore .\packages.config -PackagesDirectory .\packages\

    # ===== بناء الأدوات المخصصة =====
    - name: BuildTools Cache
      id: custombuildtool-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: tools/CustomBuildTool/bin/Release/**
        key: custombuildtool-${{ runner.os }}-${{ hashFiles('tools/CustomBuildTool/**', '!tools/CustomBuildTool/bin/**') }}
        restore-keys: custombuildtool-${{ runner.os }}-

    - name: Build Tools
      if: steps.custombuildtool-cache.outputs.cache-hit != 'true'
      shell: cmd
      working-directory: ${{github.workspace}}
      run: build\build_init.cmd

    # ===== التوليد والبناء =====
    - name: Generate
      shell: cmd
      working-directory: ${{github.workspace}}
      run: build\build_cmake.cmd "${{ matrix.generator }}" ${{ matrix.configuration }} ${{ matrix.toolchain }} generate

    - name: Build
      shell: cmd
      working-directory: ${{github.workspace}}
      run: build\build_cmake.cmd "${{ matrix.generator }}" ${{ matrix.configuration }} ${{ matrix.toolchain }} build

    # ===== رفع الملفات النهائية =====
    - name: Upload Artifacts (32-bit)
      if: matrix.toolchain == 'msvc-x86'
      uses: actions/upload-artifact@v4
      with:
        name: conker-online-32bit-Release
        path: bin-cmake/Release/mythic.exe
        retention-days: 90

    - name: Upload Artifacts (64-bit)
      if: matrix.toolchain == 'msvc-amd64'
      uses: actions/upload-artifact@v4
      with:
        name: conker-online-64bit-Release
        path: bin-cmake/Release/mythic.exe
        retention-days: 90

    # ===== (اختياري) تجميع المخرجات في ملف واحد ZIP =====
    - name: Package Build Outputs
      if: always()
      shell: cmd
      run: |
        mkdir artifacts
        copy bin-cmake\Release\mythic.exe artifacts\mythic-${{ matrix.toolchain }}.exe
        7z a -tzip conker-build-${{ matrix.toolchain }}.zip artifacts/

    - name: Upload ZIP Package
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: conker-package-${{ matrix.toolchain }}
        path: conker-build-${{ matrix.toolchain }}.zip
        retention-days: 90
